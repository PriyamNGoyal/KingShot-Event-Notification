name: Deploy Kingshot Event Notification

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/KingShot-Event-Notification
            git fetch origin
            git reset --hard origin/main
            /home/ubuntu/KingShot-Event-Notification/venv/bin/pip install -r requirements.txt
            sudo systemctl restart kingshot-event-notification
